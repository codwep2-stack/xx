// وظيفة الحفظ والتحديث
async function sbUpsert(tableName, payload) {
    const { data, error } = await supabaseClient
        .from(tableName)
        .upsert(payload, { onConflict: 'id' });
    if (error) throw error;
    return data;
}

    try {
        const { data, error } = await supabaseClient.from('prices').select('*');

                if(document.getElementById('adm-g-24')) document.getElementById('adm-g-24').value = GOLD[24];

}

async function saveGold(){
    const g24 = document.getElementById('adm-g-24').value;
    const g21 = document.getElementById('adm-g-21').value;

}

// تشغيل الجلب التلقائي عند التحميل
document.addEventListener('DOMContentLoaded', loadDataFromSB);
